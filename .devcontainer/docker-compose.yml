# Local NetBox (Diode plugin) + official Diode server + Dev Container workspace.
#
# Prerequisites:
#   ./.devcontainer/setup.sh   # NetBox secrets + official Diode quickstart
# Then:
#   docker compose -f .devcontainer/docker-compose.yml up -d --build
# Or reopen in a Dev Container / Codespace (runs setup via initializeCommand).

name: orb-platformone-test

include:
  - path: diode/docker-compose.yaml
    env_file: diode/.env

services:
  netbox: &netbox
    build:
      context: ./netbox
      dockerfile: Dockerfile
    image: orb-platformone-netbox:local
    pull_policy: never
    depends_on:
      netbox-postgres:
        condition: service_started
      netbox-redis:
        condition: service_started
      netbox-redis-cache:
        condition: service_started
    env_file: ./netbox/env/netbox.env
    environment:
      CSRF_TRUSTED_ORIGINS: https://*.app.github.dev https://*.githubpreview.dev
    healthcheck:
      start_period: 900s
      timeout: 5s
      interval: 15s
      retries: 10
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/login/ >/dev/null || exit 1"]
    volumes:
      - ./netbox/plugins.py:/etc/netbox/config/plugins.py:z,ro
      - ./netbox/secrets:/run/secrets:z,ro
      - netbox-media-files:/opt/netbox/netbox/media:rw
    ports:
      - "127.0.0.1:8000:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  netbox-worker:
    <<: *netbox
    depends_on:
      netbox:
        condition: service_healthy
    command:
      - /opt/netbox/venv/bin/python
      - /opt/netbox/netbox/manage.py
      - rqworker
    healthcheck:
      test: ["CMD-SHELL", "ps -aux | grep -v grep | grep -q rqworker || exit 1"]
      start_period: 30s
      timeout: 3s
      interval: 15s
    ports: []

  netbox-postgres:
    image: docker.io/postgres:18-alpine
    env_file: ./netbox/env/postgres.env
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - netbox-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netbox -d netbox"]
      interval: 5s
      timeout: 5s
      retries: 10

  netbox-redis:
    image: docker.io/redis:8-alpine
    command:
      - sh
      - -c
      - redis-server --appendonly yes --requirepass $$REDIS_PASSWORD
    env_file: ./netbox/env/redis.env
    volumes:
      - netbox-redis-data:/data

  netbox-redis-cache:
    image: docker.io/redis:8-alpine
    command:
      - sh
      - -c
      - redis-server --requirepass $$REDIS_PASSWORD
    env_file: ./netbox/env/redis-cache.env
    volumes:
      - netbox-redis-cache-data:/data

  # Loopback-only publish (upstream Diode compose binds all interfaces).
  # !override replaces ports instead of appending; otherwise both the
  # all-interfaces and loopback bindings remain after include merge.
  ingress-nginx:
    ports: !override
      - "127.0.0.1:${DIODE_NGINX_PORT:-8080}:80"

  workspace:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    working_dir: /workspaces/netbox-orb-extreme-platformone
    volumes:
      - ..:/workspaces/netbox-orb-extreme-platformone:z
    environment:
      NETBOX_API_URL: http://netbox:8080
      DIODE_TARGET: grpc://ingress-nginx:80/diode
      DIODE_CLIENT_ID: diode-ingest
    env_file:
      - path: ./.env.local
        required: false
    # Do not depend on netbox-worker: it waits for netbox service_healthy, which
    # would undo the service_started relaxation below and delay Dev Container attach.
    depends_on:
      netbox:
        condition: service_started
      ingress-nginx:
        condition: service_started
    command: sleep infinity
    profiles:
      - devcontainer

volumes:
  netbox-media-files:
  netbox-postgres-data:
  netbox-redis-data:
  netbox-redis-cache-data:
