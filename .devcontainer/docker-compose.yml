# Local NetBox + Diode for orb worker E2E.
# Usage:
#   ./.devcontainer/setup.sh
#   docker compose -f .devcontainer/docker-compose.yml up -d --build
#
# The Dev Container is a separate Python workspace (see devcontainer.json);
# it does not start this stack.

name: orb-platformone-test

include:
  - path: diode/docker-compose.yaml
    env_file: diode/.env

services:
  netbox: &netbox
    build:
      context: ./netbox
      dockerfile: Dockerfile
    image: orb-platformone-netbox:local
    pull_policy: never
    depends_on:
      netbox-postgres:
        condition: service_started
      netbox-redis:
        condition: service_started
      netbox-redis-cache:
        condition: service_started
    env_file: ./netbox/env/netbox.env
    # Codespaces / *.app.github.dev UI access needs these CSRF origins.
    environment:
      CSRF_TRUSTED_ORIGINS: https://*.app.github.dev https://*.githubpreview.dev
    healthcheck:
      # First boot runs migrations + Diode plugin install (can take several minutes).
      start_period: 900s
      timeout: 5s
      interval: 15s
      retries: 10
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/login/ >/dev/null || exit 1"]
    volumes:
      - ./netbox/plugins.py:/etc/netbox/config/plugins.py:z,ro
      - ./netbox/secrets:/run/secrets:z,ro
      - netbox-media-files:/opt/netbox/netbox/media:rw
    ports:
      - "127.0.0.1:8000:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  netbox-worker:
    <<: *netbox
    depends_on:
      netbox:
        condition: service_healthy
    command:
      - /opt/netbox/venv/bin/python
      - /opt/netbox/netbox/manage.py
      - rqworker
    healthcheck:
      test: ["CMD-SHELL", "ps -aux | grep -v grep | grep -q rqworker || exit 1"]
      start_period: 30s
      timeout: 3s
      interval: 15s
    ports: []

  netbox-postgres:
    image: docker.io/postgres:18-alpine
    env_file: ./netbox/env/postgres.env
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - netbox-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netbox -d netbox"]
      interval: 5s
      timeout: 5s
      retries: 10

  netbox-redis:
    image: docker.io/redis:8-alpine
    command:
      - sh
      - -c
      - redis-server --appendonly yes --requirepass $$REDIS_PASSWORD
    env_file: ./netbox/env/redis.env
    volumes:
      - netbox-redis-data:/data

  netbox-redis-cache:
    image: docker.io/redis:8-alpine
    command:
      - sh
      - -c
      - redis-server --requirepass $$REDIS_PASSWORD
    env_file: ./netbox/env/redis-cache.env
    volumes:
      - netbox-redis-cache-data:/data

  # Rootless Podman: bind-mount initdb instead of Diode's tmpfs approach.
  postgres:
    image: docker.io/postgres:18-alpine
    env_file: ./diode/.env
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
    entrypoint: ["docker-entrypoint.sh"]
    command: ["postgres"]
    volumes:
      - diode-postgres-data:/var/lib/postgresql/data
      - ./diode/initdb.d:/docker-entrypoint-initdb.d:z,ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -q -t 2 -d $$DIODE_POSTGRES_DB_NAME -U $$DIODE_POSTGRES_USER"]
      start_period: 20s
      interval: 2s
      timeout: 5s
      retries: 15
    restart: on-failure

volumes:
  netbox-media-files:
  netbox-postgres-data:
  netbox-redis-data:
  netbox-redis-cache-data:
