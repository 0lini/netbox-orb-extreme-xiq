name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"  # weekly, Monday 06:00 UTC -- see the `contract` job
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format)
        run: ruff format --check .

      - name: Test (pytest)
        run: pytest -v

  contract:
    # Fetches the live XIQ OpenAPI spec and checks /devices + /locations/tree
    # still have the query params client.py hardcodes -- see
    # tests/test_openapi_contract.py's docstring for why this is a separate,
    # scheduled job rather than part of the (offline, per-PR) `test` job above.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"

      - name: Contract check against live XIQ OpenAPI spec
        run: pytest -v -m contract
