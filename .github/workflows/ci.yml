name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"  # weekly, Monday 06:00 UTC -- see the `contract` job
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"

      - name: Install extremecloudiq-api (separately, see pyproject.toml)
        # Can't be a normal dependency: its typing-extensions~=4.3.0 pin
        # directly conflicts with netboxlabs-orb-worker's ~=4.5, with no
        # overlapping version -- pip's resolver can never satisfy both in one
        # `pip install`. --no-deps sidesteps that; the packages it actually
        # needs at runtime are already covered by this project's normal deps.
        run: pip install --no-deps "extremecloudiq-api==25.11.1.post3"

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format)
        run: ruff format --check .

      - name: Test (pytest)
        run: pytest -v

  contract:
    # Fetches the live XIQ OpenAPI spec and checks /devices + /locations/tree
    # still have the query params client.py hardcodes -- see
    # tests/test_openapi_contract.py's docstring for why this is a separate,
    # scheduled job rather than part of the (offline, per-PR) `test` job above.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"

      - name: Install extremecloudiq-api (separately, see pyproject.toml)
        # Needed even though this job only runs test_openapi_contract.py:
        # pytest -m contract still has to *collect* every file under tests/
        # before filtering by marker, and test_backend.py/test_client.py
        # import extremecloudiq unconditionally at module level -- without
        # this, collection itself fails before the marker filter ever runs.
        run: pip install --no-deps "extremecloudiq-api==25.11.1.post3"

      - name: Contract check against live XIQ OpenAPI spec
        run: pytest -v -m contract
